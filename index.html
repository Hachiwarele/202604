<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hachi Demo — Home</title>
  <meta name="description" content="One page demo site. Polished single-page design with multi-page structure." />
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="site-header"></div>

  <main class="container" id="main" tabindex="-1">
    <section class="hero" id="home-hero" aria-labelledby="home-title">
      <h1 id="home-title">素人が作ったとは思えない、たった一枚のサイト</h1>
      <p class="lead">軽量で高速、レスポンシブ。ここから他ページへ移動して作品や経歴を確認できます。</p>
      <div class="cta-row">
        <a class="btn" href="/projects.html">作品を見る</a>
        <a class="ghost" href="/about.html">詳しく</a>
      </div>
    </section>

    <section class="preview" aria-labelledby="preview-title">
      <h2 id="preview-title">ピックアッププロジェクト</h2>
      <div class="cards" id="preview-cards">
        <article class="card">
          <h3>Project Alpha</h3>
          <p class="muted">短い説明。GitHub リポジトリやデモへのリンクを掲載。</p>
          <div class="card-row">
            <a class="ghost" href="/projects.html#alpha">詳細</a>
            <a class="ghost" href="https://github.com/" target="_blank" rel="noopener">Repo</a>
          </div>
        </article>
        <article class="card">
          <h3>Project Beta</h3>
          <p class="muted">短い説明。スクリーンショットや技術スタックを示す。</p>
          <div class="card-row">
            <a class="ghost" href="/projects.html#beta">詳細</a>
            <a class="ghost" href="https://example.com" target="_blank" rel="noopener">Demo</a>
          </div>
        </article>
      </div>
    </section>

    <section class="contact-preview" aria-labelledby="contact-title">
      <h2 id="contact-title">Contact</h2>
      <p class="muted">質問や依頼は Contact ページからどうぞ。</p>
      <a class="btn" href="/contact.html">お問い合わせ</a>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="/assets/main.js"></script>
</body>
</html>
